{% extends "base.html" %}

{% block contenido %}
<div class="panel" style="max-width: 900px; margin: 0 auto;">
    <div class="panel-header">
        <h2>Alta de Nuevo Colaborador</h2>
        <p class="subtitulo-panel">Registra al empleado y asígnale su perfil operativo en el SGEA.</p>
    </div>

    <div class="panel-body">
        <form method="POST" action="{{ url_for('usuarios.nuevo_empleado') }}">
            
            <h3 style="margin-bottom: 15px; border-bottom: 1px solid var(--borde); padding-bottom: 5px;">1. Datos de Acceso</h3>
            <div class="form-row-2">
                <div class="grupo">
                    <label>Nombre Completo</label>
                    <input type="text" name="nombre" placeholder="Ej. Juan Pérez" required>
                </div>
                <div class="grupo">
                    <label>Correo Electrónico</label>
                    <input type="email" name="correo" placeholder="ejemplo@empresa.com" required>
                </div>
                <div class="grupo">
                    <label>Contraseña Temporal</label>
                    <input type="password" name="password" required>
                </div>
            </div>

            <h3 style="margin-top: 20px; margin-bottom: 15px; border-bottom: 1px solid var(--borde); padding-bottom: 5px;">2. Perfil Operativo</h3>
            <div class="form-row-4">
                
                <div class="grupo">
                    <label>Rol en el Sistema (Permisos)</label>
                    <select name="id_rol" required>
                        <option value="">Seleccionar Rol...</option>
                        {% for rol in roles %}
                            <option value="{{ rol.id_rol }}">{{ rol.nombre_rol }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="grupo">
                    <label>Departamento (Área)</label>
                    <select name="id_area" required>
                        <option value="">Seleccionar Área...</option>
                        {% for area in areas %}
                            <option value="{{ area.id_area }}">{{ area.nombre_area }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="grupo">
                    <label>Supervisor Directo</label>
                    <select name="id_supervisor">
                        <option value="">Ninguno (Es Director/Gerente)</option>
                        {% for jefe in supervisores %}
                            <option value="{{ jefe.id_usuario }}">{{ jefe.nombre_completo }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <h3 style="margin-top: 20px; margin-bottom: 15px; border-bottom: 1px solid var(--borde); padding-bottom: 5px;">3. Nómina (Finanzas)</h3>
            <div class="form-row-2">
                <div class="grupo">
                    <label>Fecha de Contratación</label>
                    <input type="date" name="fecha_contratacion" required>
                </div>
                <div class="grupo">
                    <label>Salario Mensual ($)</label>
                    <input type="number" step="0.01" name="salario_mensual" placeholder="Ej. 12000.00" required>
                </div>
            </div>

            <div class="acciones-form" style="margin-top: 30px;">
                <button type="submit" class="btn-principal">Dar de Alta</button>
                <a href="{{ url_for('inicio') }}" class="btn-secundario">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
