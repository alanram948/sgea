{% extends "base.html" %}

{% block contenido %}
<div class="panel">
    <div class="panel-header">
        <h2>Crear Nuevo Artículo</h2>
        <p class="subtitulo-panel">Captura los datos maestros del producto para el catálogo del ERP.</p>
    </div>

    <div class="panel-body">
        <form method="POST" action="{{ url_for('inventario.nuevo_producto') }}">
            
            <div class="form-row-2">
                <div class="grupo">
                    <label>Código SKU / Barras</label>
                    <input type="text" name="codigo_sku" required placeholder="Ej. CAR-BIS-001">
                </div>
                <div class="grupo">
                    <label>Descripción del Producto</label>
                    <input type="text" name="descripcion" required placeholder="Ej. Bistec Picado de Res (Kg)">
                </div>
            </div>

            <div class="form-row-2">
                <div class="grupo">
                    <label>Tipo de Artículo</label>
                    <select name="tipo_articulo">
                        <option value="Producto Fisico">Producto Físico</option>
                        <option value="Servicio">Servicio</option>
                    </select>
                </div>
                <div class="grupo">
                    <label>Método de Gestión</label>
                    <select name="metodo_gestion">
                        <option value="Ninguno">Ninguno</option>
                        <option value="Lotes y Caducidad">Lotes y Caducidad</option>
                    </select>
                </div>
            </div>

            <div class="form-row-4">
                <div class="grupo">
                    <label>Costo Estándar ($)</label>
                    <input type="number" step="0.01" name="costo_estandar" required value="0.00">
                </div>
                <div class="grupo">
                    <label>Precio de Venta ($)</label>
                    <input type="number" step="0.01" name="precio_venta_base" required value="0.00">
                </div>
                <div class="grupo">
                    <label>Stock Mínimo (Alerta)</label>
                    <input type="number" step="0.01" name="stock_minimo" required value="0">
                </div>
            </div>

            <div class="caja-opciones">
                <label>
                    <input type="checkbox" name="se_compra" checked> 
                    <span>Puede Comprarse</span>
                </label>
                <label>
                    <input type="checkbox" name="se_vende" checked> 
                    <span>Puede Venderse</span>
                </label>
                <label>
                    <input type="checkbox" name="se_inventaria" checked> 
                    <span>Almacenable (Se Inventaria)</span>
                </label>
            </div>

            <div class="acciones-form">
                <button type="submit" class="btn-principal">Guardar Artículo</button>
                <a href="{{ url_for('inventario.inventario') }}" class="btn-secundario">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
